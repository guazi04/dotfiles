# ============================================================
# General Settings
# ============================================================

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Allow escape sequences to pass through (needed for theme detection in apps like opencode)
set -g allow-passthrough on

# Start window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Set default shell
set -g default-shell /bin/zsh

# ============================================================
# Key Bindings
# ============================================================

# Prefix: C-b (tmux default)
set -g prefix C-b
bind C-b send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Alt+arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ============================================================
# Catppuccin Mocha Theme (manual)
# ============================================================

# Track current theme (dark = Mocha, light = Latte)
set -g @theme "dark"

# Color variables (Mocha defaults)
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_cyan="#89dceb"
thm_black="#181825"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f5c2e7"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"
thm_black4="#585b70"

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=${thm_bg}"

# Status left: session name
set -g status-left-length 40
set -g status-left "#[fg=${thm_black},bg=${thm_blue},bold]  #S #[fg=${thm_blue},bg=${thm_bg},nobold] "

# Status right: date & time
set -g status-right-length 80
set -g status-right "#[fg=${thm_gray}]#[fg=${thm_fg},bg=${thm_gray}]  %H:%M #[fg=${thm_magenta},bg=${thm_gray}]#[fg=${thm_black},bg=${thm_magenta},bold]  %Y-%m-%d "

# Window status
setw -g window-status-format "#[fg=${thm_black4},bg=${thm_bg}]  #I #W "
setw -g window-status-current-format "#[fg=${thm_bg},bg=${thm_green}]#[fg=${thm_black},bg=${thm_green},bold] #I #W #[fg=${thm_green},bg=${thm_bg}]"
setw -g window-status-activity-style "fg=${thm_yellow},bg=${thm_bg}"

# Pane borders
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Message style
set -g message-style "fg=${thm_cyan},bg=${thm_bg}"
set -g message-command-style "fg=${thm_cyan},bg=${thm_bg}"

# Clock
setw -g clock-mode-colour "${thm_blue}"

# Selection / copy mode
setw -g mode-style "fg=${thm_pink},bg=${thm_gray},bold"
set -s copy-command 'pbcopy'
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'

# ============================================================
# Theme Toggle (prefix + T)
# ============================================================

# Switch to Catppuccin Latte (light)
bind T if-shell '[ "$(tmux show -gqv @theme)" = "dark" ]' \
  'set -g @theme "light"; \
   set -g status-style "bg=#eff1f5"; \
   set -g status-left "#[fg=#e6e9ef,bg=#1e66f5,bold]  #S #[fg=#1e66f5,bg=#eff1f5,nobold] "; \
   set -g status-right "#[fg=#ccd0da]#[fg=#4c4f69,bg=#ccd0da]  %H:%M #[fg=#8839ef,bg=#ccd0da]#[fg=#e6e9ef,bg=#8839ef,bold]  %Y-%m-%d "; \
   setw -g window-status-format "#[fg=#9ca0b0,bg=#eff1f5]  #I #W "; \
   setw -g window-status-current-format "#[fg=#eff1f5,bg=#40a02b]#[fg=#e6e9ef,bg=#40a02b,bold] #I #W #[fg=#40a02b,bg=#eff1f5]"; \
   setw -g window-status-activity-style "fg=#df8e1d,bg=#eff1f5"; \
   set -g pane-border-style "fg=#ccd0da"; \
   set -g pane-active-border-style "fg=#1e66f5"; \
   set -g message-style "fg=#04a5e5,bg=#eff1f5"; \
   set -g message-command-style "fg=#04a5e5,bg=#eff1f5"; \
   setw -g clock-mode-colour "#1e66f5"; \
   setw -g mode-style "fg=#ea76cb,bg=#ccd0da,bold"; \
   display-message "Theme: light ☀️"' \
  'set -g @theme "dark"; \
   set -g status-style "bg=#1e1e2e"; \
   set -g status-left "#[fg=#181825,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#1e1e2e,nobold] "; \
   set -g status-right "#[fg=#313244]#[fg=#cdd6f4,bg=#313244]  %H:%M #[fg=#cba6f7,bg=#313244]#[fg=#181825,bg=#cba6f7,bold]  %Y-%m-%d "; \
   setw -g window-status-format "#[fg=#585b70,bg=#1e1e2e]  #I #W "; \
   setw -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1]#[fg=#181825,bg=#a6e3a1,bold] #I #W #[fg=#a6e3a1,bg=#1e1e2e]"; \
   setw -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e"; \
   set -g pane-border-style "fg=#313244"; \
   set -g pane-active-border-style "fg=#89b4fa"; \
   set -g message-style "fg=#89dceb,bg=#1e1e2e"; \
   set -g message-command-style "fg=#89dceb,bg=#1e1e2e"; \
   setw -g clock-mode-colour "#89b4fa"; \
   setw -g mode-style "fg=#f5c2e7,bg=#313244,bold"; \
   display-message "Theme: dark 🌙"'
